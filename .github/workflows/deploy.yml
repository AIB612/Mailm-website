name: Deploy Main Site

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'project/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        working-directory: project
        run: npm ci

      - name: Build site
        working-directory: project
        run: npm run build

      - name: Deploy via FTPS (Python)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          from ftplib import FTP_TLS

          host = os.environ['FTP_SERVER']
          user = os.environ['FTP_USERNAME']
          password = os.environ['FTP_PASSWORD']
          local = Path('project/dist')
          remote_base = '/malim/malim'

          ftps = FTP_TLS()
          ftps.connect(host, 21, timeout=30)
          ftps.login(user, password)
          ftps.prot_p()

          def safe_nlst(path: str):
              try:
                  return ftps.nlst(path)
              except Exception as e:
                  return [f'<error listing {path}: {e}>']

          print(f'pwd={ftps.pwd()}')
          for probe in ['/', '/malim.online', '/public_html', '/www', '/www/www', '/domains', '/domains/malim.online', '/domains/malim.online/public_html', '/public_html/malim.online', '/public_html/www.malim.online']:
              print(f'listing {probe}: {safe_nlst(probe)}')

          def ensure_dir(path: str):
              parts = [p for p in path.strip('/').split('/') if p]
              cur = ''
              for p in parts:
                  cur += '/' + p
                  try:
                      ftps.mkd(cur)
                  except Exception:
                      pass

          def upload_dir(local_dir: Path, remote_dir: str):
              ensure_dir(remote_dir)
              for item in local_dir.iterdir():
                  target = f"{remote_dir}/{item.name}"
                  if item.is_dir():
                      upload_dir(item, target)
                  else:
                      with item.open('rb') as f:
                          ftps.storbinary(f'STOR {target}', f)
                          print(f'uploaded {target}')

          upload_dir(local, remote_base)
          ftps.quit()
          PY
